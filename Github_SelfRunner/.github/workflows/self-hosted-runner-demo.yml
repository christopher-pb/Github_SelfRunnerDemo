name: Self-Hosted Runner Demo (Python)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test:

    runs-on: [self-hosted, windows, x64]

    steps:

      # Step 1 — Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3 — Install dependencies
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4 — Show environment info
      - name: Show environment info
        shell: pwsh
        run: |
          python --version
          pip list
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Name: ${{ runner.name }}"
          echo "Workflow triggered by: ${{ github.event_name }}"

      # Step 5 — Run calculator script
      - name: Run calculator script
        shell: pwsh
        run: python calculator.py

      # Step 6 — Run tests
      - name: Run tests with pytest
        shell: pwsh
        run: pytest test_calculator.py -v

      # Step 7 — Success message
      - name: Job summary
        shell: pwsh
        run: |
          echo "All tests passed on self-hosted runner!"
          echo "This job ran on YOUR machine, not GitHub cloud."
