# .github/workflows/self-hosted-runner-demo.yml
#
# This workflow runs on a self-hosted Windows runner (your own machine).
# Trigger: runs on every push or pull request to the main branch, plus manual dispatch.

name: Self-Hosted Runner Demo (Python)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test:
    # Use the broadest label set so it works on a typical self-hosted Windows runner.
    # If you *want* to restrict to specific runners, add your custom labels here.
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (and pytest)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          } else {
            Write-Host "requirements.txt not found; skipping project dependency install."
          }
          pip install -U pytest

      - name: Show environment info
        shell: pwsh
        run: |
          python --version
          pip --version
          pip list
          Write-Host "Runner OS: $env:RUNNER_OS"
          Write-Host "Runner Name: $env:RUNNER_NAME"
          Write-Host "Workflow triggered by: $env:GITHUB_EVENT_NAME"

      - name: Run calculator script
        shell: pwsh
        run: |
          if (Test-Path "calculator.py") {
            python calculator.py
          } else {
            Write-Error "calculator.py not found at repo root. Update the workflow paths or use working-directory."
          }

      - name: Run tests with pytest
        shell: pwsh
        run: |
          if (Test-Path "test_calculator.py") {
            pytest -v test_calculator.py
          } else {
            Write-Error "test_calculator.py not found at repo root. Update the workflow paths or use working-directory."
          }

      - name: Job summary
        shell: pwsh
        run: |
          Write-Host "All tests passed on self-hosted runner!"
          Write-Host "This job ran on YOUR machine, not GitHub's cloud."
