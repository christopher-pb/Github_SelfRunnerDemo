# .github/workflows/self-hosted-runner-demo.yml
#
# This workflow runs on YOUR OWN machine (self-hosted runner)
# instead of GitHub's cloud servers.
# Works on any machine (Windows, Linux, macOS) with Python on PATH.
#
# Trigger: runs on every push or pull request to the main branch.

name: Self-Hosted Runner Demo (Python)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-test:
    # ---------------------------------------------------------------
    # KEY LINE: "self-hosted" tells GitHub to use YOUR machine.
    # You can also add labels like [self-hosted, Windows, python]
    # that you set when registering your runner.
    # ---------------------------------------------------------------
    runs-on: self-hosted

    steps:
      - name: Mark repository as safe for all users
        shell: powershell
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      # Step 1: Check out the repository code onto the runner machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Find Python on the machine
      - name: Locate Python
        shell: powershell
        run: |
          $found = $false
          # First check common install locations (avoids Windows Store alias)
          $paths = @(
            'C:\Python313\python.exe',
            'C:\Python312\python.exe',
            'C:\Python311\python.exe',
            'C:\Python310\python.exe',
            "$env:LOCALAPPDATA\Programs\Python\Python313\python.exe",
            "$env:LOCALAPPDATA\Programs\Python\Python312\python.exe",
            "$env:LOCALAPPDATA\Programs\Python\Python311\python.exe"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              echo "PYTHON=$p" >> $env:GITHUB_ENV
              Write-Host "Found Python at: $p"
              $found = $true
              break
            }
          }
          # Then try py launcher / python3 on PATH
          if (-not $found) {
            foreach ($cmd in @('py', 'python3')) {
              try {
                $out = & $cmd --version 2>&1
                if ($out -match 'Python \d') {
                  echo "PYTHON=$cmd" >> $env:GITHUB_ENV
                  Write-Host "Found: $cmd -> $out"
                  $found = $true
                  break
                }
              } catch {}
            }
          }
          if (-not $found) {
            Write-Error "Python not found. Please install Python and ensure it is on PATH."
            exit 1
          }

      # Step 3: Install dependencies from requirements.txt
      - name: Install dependencies
        shell: powershell
        run: |
          & $env:PYTHON -m pip install --upgrade pip
          & $env:PYTHON -m pip install -r requirements.txt

      # Step 4: Show environment info (great for learning/debugging)
      - name: Show environment info
        shell: powershell
        run: |
          & $env:PYTHON --version
          & $env:PYTHON -m pip list
          Write-Host "Runner OS: ${{ runner.os }}"
          Write-Host "Runner Name: ${{ runner.name }}"
          Write-Host "Workflow triggered by: ${{ github.event_name }}"

      # Step 5: Run the main calculator script
      - name: Run calculator script
        shell: powershell
        run: |
          & $env:PYTHON calculator.py

      # Step 6: Run the automated tests with pytest
      - name: Run tests with pytest
        shell: powershell
        run: |
          & $env:PYTHON -m pytest test_calculator.py -v

      # Step 7: Show a success message
      - name: Job summary
        shell: powershell
        run: |
          Write-Host "All tests passed on self-hosted runner!"
          Write-Host "This job ran on YOUR machine, not GitHub's cloud."
