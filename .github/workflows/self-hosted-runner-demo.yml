# .github/workflows/self-hosted-runner-demo.yml
#
# This workflow runs on YOUR OWN machine (self-hosted runner)
# instead of GitHub's cloud servers.
# Works on any machine (Windows, Linux, macOS) with Python on PATH.
#
# Trigger: runs on every push or pull request to the main branch.

name: Self-Hosted Runner Demo (Python)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-test:
    # ---------------------------------------------------------------
    # KEY LINE: "self-hosted" tells GitHub to use YOUR machine.
    # You can also add labels like [self-hosted, Windows, python]
    # that you set when registering your runner.
    # ---------------------------------------------------------------
    runs-on: self-hosted

    steps:
      # Step 1: Check out the repository code onto the runner machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Find Python on the machine (works on any OS)
      - name: Locate Python
        shell: bash
        run: |
          if command -v python3 &>/dev/null; then
            echo "PYTHON=python3" >> "$GITHUB_ENV"
          elif command -v python &>/dev/null; then
            echo "PYTHON=python" >> "$GITHUB_ENV"
          else
            echo "::error::Python not found on PATH. Please install Python."
            exit 1
          fi

      # Step 3: Install dependencies from requirements.txt
      - name: Install dependencies
        shell: bash
        run: |
          $PYTHON -m pip install --upgrade pip
          $PYTHON -m pip install -r requirements.txt

      # Step 4: Show environment info (great for learning/debugging)
      - name: Show environment info
        shell: bash
        run: |
          $PYTHON --version
          $PYTHON -m pip list
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Name: ${{ runner.name }}"
          echo "Workflow triggered by: ${{ github.event_name }}"

      # Step 5: Run the main calculator script
      - name: Run calculator script
        shell: bash
        run: $PYTHON calculator.py

      # Step 6: Run the automated tests with pytest
      - name: Run tests with pytest
        shell: bash
        run: $PYTHON -m pytest test_calculator.py -v

      # Step 7: Show a success message
      - name: Job summary
        shell: bash
        run: |
          echo "All tests passed on self-hosted runner!"
          echo "This job ran on YOUR machine, not GitHub's cloud."
