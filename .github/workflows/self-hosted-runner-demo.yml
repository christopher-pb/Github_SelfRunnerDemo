# .github/workflows/self-hosted-runner-demo.yml
#
# This workflow runs on YOUR OWN Windows machine (self-hosted runner)
# instead of GitHub's cloud servers.
#
# Trigger: runs on every push or pull request to the main branch.
name: Self-Hosted Runner Demo (Python)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  build-and-test:
    runs-on: [self-hosted, windows, x64]
    steps:
      # Step 1: Check out the repository code onto the runner machine
      - name: Checkout repository
        uses: actions/checkout@v4
      # Step 2: Install dependencies from requirements.txt
      - name: Install dependencies
        run: |
          & "C:\Users\alaka\AppData\Local\Programs\Python\Python313\python.exe" -m pip install --upgrade pip
          & "C:\Users\alaka\AppData\Local\Programs\Python\Python313\python.exe" -m pip install -r requirements.txt
      # Step 3: Show environment info (great for learning/debugging)
      - name: Show environment info
        run: |
          & "C:\Users\alaka\AppData\Local\Programs\Python\Python313\python.exe" --version
          & "C:\Users\alaka\AppData\Local\Programs\Python\Python313\python.exe" -m pip list
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Name: ${{ runner.name }}"
          echo "Workflow triggered by: ${{ github.event_name }}"
      # Step 4: Run the main calculator script
      - name: Run calculator script
        run: & "C:\Users\alaka\AppData\Local\Programs\Python\Python313\python.exe" calculator.py
      # Step 5: Run the automated tests with pytest
      - name: Run tests with pytest
        run: & "C:\Users\alaka\AppData\Local\Programs\Python\Python313\python.exe" -m pytest test_calculator.py -v
      # Step 6: Show a success message
      - name: Job summary
        run: |
          echo "All tests passed on self-hosted runner!"
          echo "This job ran on YOUR machine, not GitHub's cloud."